temporal_water_mask_detector:
  algorithm_version: phase2c2a_v1
  fps: 20.0
  preprocessing:
    gaussian_blur_kernel: 3
    exposure_reference: sequence_median
    short_background_window: 3
  candidates:
    residual_threshold: 4.0
    residual_percentile: 98.8
    morphology_close_kernel: 3
    morphology_dilate_iterations: 1
    min_area_px: 4
    max_area_px: 1800
    max_aspect_ratio: 10.0
  tracking:
    max_gap_frames: 2
    max_center_distance_px: 15.0
    min_bbox_iou_for_distant_match: 0.02
  classification:
    minimum_track_observations: 2
    water_score_threshold: 0.48
    dry_score_threshold: 0.48
    minimum_score_margin: 0.10
    high_confidence_threshold: 0.50
  evidence:
    maximum_propagation_radius_px: 22.0
    minimum_kernel_sigma_px: 4.0
    probability_scale: 2.0
    water_probability_threshold: 0.36
    unknown_evidence_threshold: 0.08
    morphology_close_kernel: 5
  ablation:
    shuffle_seed: 2027
