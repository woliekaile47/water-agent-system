warning:
  mode: "simulation_record_only"
  description: "S8 decision calculation for direct simulation end-to-end verification only."

  input:
    final_forecast_result_json: "outputs/json/final_forecast_result.json"
    physical_constraint_result_json: "outputs/json/physical_constraint_result.json"
    case_retrieval_result_json: "outputs/json/case_retrieval_result.json"
    corrected_forecast_result_json: "outputs/json/corrected_forecast_result.json"
    deterministic_forecast_result_json: "outputs/json/deterministic_forecast_result.json"
    area_volume_result_json: "outputs/json/water_area_volume_result.json"
    weather_correction_result_json: "outputs/json/weather_correction_result.json"

  output:
    warning_dir: "data/warnings"
    report_dir: "outputs/reports"
    json_dir: "outputs/json"
    figure_dir: "outputs/figures"
    audit_dir: "data/audit_logs"

  warning_thresholds_cm: {blue: 15.0, yellow: 30.0, orange: 50.0}

  action_policy:
    none: "Simulation only: no warning action. Continue calculation."
    blue: "Simulation only: blue-level condition record; no external notification."
    yellow: "Simulation only: yellow-level condition record; no external notification."
    orange: "Simulation only: orange-level condition record; no external notification or device action."

  confidence:
    mode: "mvp_rule_based"
    default_confidence_score: 0.75
    note: "Research placeholder; physical confidence is reported when available."

  mvp_note: "Non-authoritative simulation record. External notification and real device actions are prohibited."
